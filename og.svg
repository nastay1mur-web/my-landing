<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050510"/>
      <stop offset="100%" stop-color="#12122A"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#00D4FF"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="60" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Glow blobs -->
  <circle cx="200" cy="150" r="250" fill="#6366F1" opacity="0.07" filter="url(#glow2)"/>
  <circle cx="1000" cy="480" r="200" fill="#00D4FF" opacity="0.06" filter="url(#glow2)"/>
  <circle cx="700" cy="300" r="180" fill="#EC4899" opacity="0.04" filter="url(#glow2)"/>

  <!-- Grid lines -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="300" y1="0" x2="300" y2="630" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="900" y1="0" x2="900" y2="630" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#accent)"/>

  <!-- Logo mark — "A" in gradient circle -->
  <circle cx="100" cy="90" r="36" fill="#0A0A1A" stroke="#6366F1" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="100" y="100" font-family="Arial, sans-serif" font-size="32" font-weight="800" text-anchor="middle" fill="url(#accent)">A</text>

  <!-- Brand name -->
  <text x="152" y="82" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#F8FAFC">AsiaMoor</text>
  <text x="152" y="108" font-family="Arial, sans-serif" font-size="18" font-weight="400" fill="#475569">.dev</text>

  <!-- Main headline -->
  <text x="100" y="250" font-family="Arial, sans-serif" font-size="72" font-weight="800" fill="#F8FAFC">Сайты, приложения</text>
  <text x="100" y="340" font-family="Arial, sans-serif" font-size="72" font-weight="800" fill="url(#accent2)">и AI-агенты</text>

  <!-- Subtitle -->
  <text x="100" y="410" font-family="Arial, sans-serif" font-size="28" fill="#94A3B8">Превращаю идеи в рабочие цифровые продукты</text>

  <!-- Stats -->
  <rect x="100" y="455" width="200" height="80" rx="12" fill="#0A0A1A" stroke="#6366F1" stroke-opacity="0.3" stroke-width="1"/>
  <text x="200" y="492" font-family="Arial, sans-serif" font-size="36" font-weight="800" text-anchor="middle" fill="#6366F1">20+</text>
  <text x="200" y="520" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#475569">ПРОЕКТОВ</text>

  <rect x="320" y="455" width="200" height="80" rx="12" fill="#0A0A1A" stroke="#00D4FF" stroke-opacity="0.3" stroke-width="1"/>
  <text x="420" y="492" font-family="Arial, sans-serif" font-size="36" font-weight="800" text-anchor="middle" fill="#00D4FF">100%</text>
  <text x="420" y="520" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#475569">В СРОК</text>

  <rect x="540" y="455" width="200" height="80" rx="12" fill="#0A0A1A" stroke="#EC4899" stroke-opacity="0.3" stroke-width="1"/>
  <text x="640" y="492" font-family="Arial, sans-serif" font-size="36" font-weight="800" text-anchor="middle" fill="#EC4899">24ч</text>
  <text x="640" y="520" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#475569">ОТВЕТ</text>

  <!-- Right side decoration -->
  <rect x="900" y="200" width="220" height="60" rx="30" fill="#6366F1" opacity="0.15" stroke="#6366F1" stroke-opacity="0.4" stroke-width="1"/>
  <text x="1010" y="238" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="#6366F1">✦ Квизы</text>

  <rect x="940" y="285" width="220" height="60" rx="30" fill="#00D4FF" opacity="0.10" stroke="#00D4FF" stroke-opacity="0.4" stroke-width="1"/>
  <text x="1050" y="323" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="#00D4FF">✦ Калькуляторы</text>

  <rect x="900" y="370" width="220" height="60" rx="30" fill="#EC4899" opacity="0.10" stroke="#EC4899" stroke-opacity="0.4" stroke-width="1"/>
  <text x="1010" y="408" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="#EC4899">✦ AI-агенты</text>

  <!-- Bottom bar -->
  <rect x="0" y="627" width="1200" height="3" fill="url(#accent2)"/>
</svg>
